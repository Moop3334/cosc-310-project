services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./backend/app:/code/app
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend/the-graveyard-shift
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/the-graveyard-shift:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://backend:80
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  client_node_modules: